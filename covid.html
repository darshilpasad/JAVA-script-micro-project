<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COVID-19 Statistics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
      }

      .container {
        width: 80%;
        max-width: 800px;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      select {
        display: block;
        margin: 20px auto;
        padding: 10px;
        font-size: 16px;
      }

      .stats {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      .card {
        background: #2196f3;
        color: white;
        padding: 20px;
        margin: 10px;
        border-radius: 10px;
        text-align: center;
        width: 180px;
      }

      .card h2 {
        margin-bottom: 10px;
      }

      canvas {
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>COVID-19 Statistics Dashboard</h1>

      <select id="country">
        <option value="USA">USA</option>
        <option value="India">India</option>
        <option value="Brazil">Brazil</option>
        <option value="Russia">Russia</option>
        <option value="UK">UK</option>
      </select>

      <div class="stats">
        <div class="card">
          <h2>Confirmed</h2>
          <p id="cases">0</p>
        </div>

        <div class="card">
          <h2>Recovered</h2>
          <p id="recovered">0</p>
        </div>

        <div class="card">
          <h2>Deaths</h2>
          <p id="deaths">0</p>
        </div>
      </div>

      <canvas id="chart"></canvas>
    </div>

    <script>
      const country = document.getElementById("country");
      const cases = document.getElementById("cases");
      const recovered = document.getElementById("recovered");
      const deaths = document.getElementById("deaths");

      const ctx = document.getElementById("chart").getContext("2d");

      let covidChart;

      async function loadData() {
        try {
          const response = await fetch(
            `https://disease.sh/v3/covid-19/countries/${country.value}?strict=true`,
          );

          const data = await response.json();

          cases.innerHTML = Number(data.cases).toLocaleString();
          recovered.innerHTML = Number(data.recovered).toLocaleString();
          deaths.innerHTML = Number(data.deaths).toLocaleString();

          if (covidChart) {
            covidChart.destroy();
          }

          covidChart = new Chart(ctx, {
            type: "bar",
            data: {
              labels: ["Confirmed", "Recovered", "Deaths"],
              datasets: [
                {
                  label: data.country,
                  data: [data.cases, data.recovered, data.deaths],
                  backgroundColor: ["#2196f3", "#4caf50", "#f44336"],
                },
              ],
            },
            options: {
              responsive: true,
              scales: {
                y: {
                  beginAtZero: true,
                },
              },
            },
          });
        } catch (error) {
          alert("Unable to fetch data. Check your internet connection.");
          console.log(error);
        }
      }

      country.addEventListener("change", loadData);

      loadData();

      // Refresh every 60 seconds
      setInterval(loadData, 60000);
    </script>
  </body>
</html>
